name: Android TWA — build AAB

# Dispara manualmente (aba Actions → Run workflow) ou empurrando uma tag android-v*
on:
  workflow_dispatch:
  push:
    tags:
      - 'android-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar pacotes do SDK (compileSdk 36 / gerado pelo bubblewrap 1.24.1)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Instalar bubblewrap (pin da versão validada)
        run: npm install -g @bubblewrap/cli@1.24.1

      - name: Configurar bubblewrap (JDK + SDK)
        run: |
          mkdir -p "$HOME/.bubblewrap"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_SDK_ROOT" > "$HOME/.bubblewrap/config.json"
          cat "$HOME/.bubblewrap/config.json"; echo

      - name: Restaurar keystore (secret base64)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android.keystore
          test -s android.keystore && echo "keystore OK ($(wc -c < android.keystore) bytes)"

      - name: Gerar projeto Android a partir do manifest
        run: bubblewrap update --skipVersionUpgrade

      - name: Build assinado (.aab + .apk)
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: SHA-256 do certificado (para o assetlinks.json)
        run: |
          echo "== Fingerprint da chave de assinatura (upload key) =="
          keytool -list -v -keystore android.keystore -alias plan \
            -storepass "$BUBBLEWRAP_KEYSTORE_PASSWORD" 2>/dev/null | grep -E "SHA256:" || true
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Guardar .aab e .apk como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-apk
          path: |
            *.aab
            *.apk
          if-no-files-found: warn

      - name: Remover keystore do runner
        if: always()
        run: rm -f android.keystore
